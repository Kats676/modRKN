name: Build Mod Fast
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Package JAR Directly
        run: |
          mkdir -p build/libs
          zip -r build/libs/rknmod-1.0.0.jar src/main/java src/main/resources
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rknmod-jar
          path: build/libs/*.jar
